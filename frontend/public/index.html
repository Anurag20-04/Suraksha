<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0B1220" />
  <meta name="description" content="SURAKSHA – Women Safety Application. Emergency SOS, safe navigation, and real-time alerts for NSHM campus and surrounding areas." />

  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SURAKSHA" />

  <!-- Open Graph -->
  <meta property="og:title" content="SURAKSHA – Women Safety" />
  <meta property="og:description" content="Emergency SOS, safe routes, and real-time safety alerts" />
  <meta property="og:type" content="website" />

  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  <title>SURAKSHA – Women Safety</title>

  <style>
    /* Critical CSS — prevent FOUC */
    body { margin: 0; background: #0B1220; font-family: 'Sora', sans-serif; }
    #root { height: 100vh; }
    .splash {
      position: fixed; inset: 0;
      background: #0B1220;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; z-index: 9999;
      transition: opacity 0.5s;
    }
    .splash-logo { font-size: 48px; animation: sp-bounce 1s ease-in-out infinite; }
    .splash-title { font-size: 20px; font-weight: 800; letter-spacing: 3px; color: #E11D74; }
    .splash-sub { font-size: 12px; color: #64748B; letter-spacing: 1px; }
    @keyframes sp-bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
  </style>
</head>
<body>
  <div id="splash" class="splash">
    <div class="splash-logo">🛡️</div>
    <div class="splash-title">SURAKSHA</div>
    <div class="splash-sub">WOMEN SAFETY SYSTEM</div>
  </div>
  <div id="root"></div>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const s = document.getElementById('splash');
        if (s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 500); }
      }, 1000);
    });
  </script>
</body>
</html>
